<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RJ Admin"/>
<meta name="theme-color" content="#0D1B2A"/>
<title>RJ Admin Panel</title>
<style>
:root{--navy:#0D1B2A;--navy2:#112236;--blue:#1E5BFF;--cyan:#00AEEF;--orange:#FF7A00;--white:#fff;--card:#0f2035;--border:rgba(255,255,255,0.08);--muted:#8fa3b8;--green:#25d366;--red:#ef4444;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,'Poppins',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden;}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:360px;text-align:center;position:relative;}
.login-card::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;}
.login-logo{font-size:2.5rem;margin-bottom:1rem;}
.login-card h2{font-size:1.2rem;font-weight:800;margin-bottom:.3rem;}
.login-card p{font-size:.8rem;color:var(--muted);margin-bottom:2rem;}
.login-card input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;color:var(--white);font-size:.9rem;outline:none;margin-bottom:1rem;transition:border-color .2s;}
.login-card input:focus{border-color:var(--cyan);}
.login-card input::placeholder{color:rgba(255,255,255,.25);}
.btn-login{width:100%;padding:.85rem;background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.9;}
.login-err{color:var(--red);font-size:.8rem;margin-top:.75rem;display:none;}

/* APP */
.app{display:none;min-height:100vh;flex-direction:column;}
.app.active{display:flex;}

/* TOP BAR */
.topbar{background:rgba(13,27,42,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:.75rem;}
.tb-logo{font-size:1.2rem;}
.tb-title{font-size:.95rem;font-weight:800;}
.tb-sub{font-size:.7rem;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.notif-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .2s;}
.notif-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.notif-btn.on{border-color:var(--green);color:var(--green);}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;padding:1rem 1.25rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;}
.stat-card .num{font-size:1.6rem;font-weight:900;color:var(--cyan);}
.stat-card .lbl{font-size:.68rem;color:var(--muted);margin-top:2px;}

/* TOOLBAR */
.toolbar{padding:.75rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.search-box{flex:1;min-width:180px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:.6rem 1rem;color:var(--white);font-size:.85rem;outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--cyan);}
.search-box::placeholder{color:rgba(255,255,255,.25);}
.filter-select{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;color:var(--white);font-size:.82rem;outline:none;cursor:pointer;}
.filter-select option{background:var(--navy2);}
.refresh-btn{background:rgba(0,174,239,.1);border:1px solid rgba(0,174,239,.25);border-radius:8px;padding:.6rem 1rem;color:var(--cyan);font-size:.82rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.refresh-btn:hover{background:rgba(0,174,239,.2);}

/* LEADS */
.leads-container{flex:1;padding:1rem 1.25rem;overflow-y:auto;}
.leads-header{font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.75rem;}
.lead-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:.75rem;transition:border-color .3s;position:relative;overflow:hidden;}
.lead-card.new{border-color:rgba(0,174,239,.35);}
.lead-card.new::before{content:'NEW';position:absolute;top:.6rem;right:.6rem;background:var(--cyan);color:var(--navy);font-size:.6rem;font-weight:800;padding:.2rem .5rem;border-radius:4px;letter-spacing:.06em;}
.lead-card.read{border-color:var(--border);}
.lead-top{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.75rem;}
.lead-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.lead-name{font-size:.93rem;font-weight:700;}
.lead-time{font-size:.7rem;color:var(--muted);margin-top:2px;}
.lead-service{display:inline-block;background:rgba(30,91,255,.15);border:1px solid rgba(30,91,255,.25);color:var(--cyan);font-size:.68rem;font-weight:600;padding:.18rem .55rem;border-radius:4px;margin-top:4px;}
.lead-details{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem;}
.lead-detail{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--muted);}
.lead-detail .icon{font-size:.85rem;flex-shrink:0;}
.lead-detail a{color:var(--cyan);text-decoration:none;}
.lead-message{background:rgba(255,255,255,.03);border-radius:8px;padding:.6rem .8rem;font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:.75rem;}
.lead-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
.action-btn{padding:.45rem .9rem;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:flex;align-items:center;gap:.35rem;}
.btn-reply{background:var(--green);color:#fff;}
.btn-reply:hover{background:#1da855;}
.btn-call{background:rgba(30,91,255,.2);border:1px solid rgba(30,91,255,.3)!important;color:var(--cyan);}
.btn-mark{background:rgba(255,255,255,.06);border:1px solid var(--border)!important;color:var(--muted);}
.btn-mark:hover{border-color:var(--orange)!important;color:var(--orange);}
.btn-delete{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)!important;color:var(--red);}
.btn-delete:hover{background:rgba(239,68,68,.2);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-state .icon{font-size:3rem;margin-bottom:1rem;}
.empty-state h3{font-size:1rem;font-weight:700;margin-bottom:.5rem;color:var(--white);}
.empty-state p{font-size:.85rem;line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.5rem;font-size:.85rem;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.info{border-color:var(--cyan);color:var(--cyan);}

/* BOTTOM NAV */
.bottom-nav{background:rgba(13,27,42,.97);border-top:1px solid var(--border);padding:.75rem 1.25rem;display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;font-size:.65rem;color:var(--muted);cursor:pointer;padding:.5rem;border-radius:8px;transition:all .2s;}
.bnav-item.active,.bnav-item:hover{color:var(--cyan);background:rgba(0,174,239,.08);}
.bnav-icon{font-size:1.2rem;}

/* BADGE */
.badge{background:var(--orange);color:#fff;font-size:.6rem;font-weight:800;padding:.1rem .4rem;border-radius:100px;margin-left:.3rem;vertical-align:middle;}

@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .lead-details{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🛡️</div>
    <h2>RJ Global Admin</h2>
    <p>Private panel — authorized access only</p>
    <input type="password" id="pinInput" placeholder="Enter your PIN" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">Access Panel</button>
    <div class="login-err" id="loginErr">❌ Incorrect PIN. Try again.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="tb-logo">🖥️</div>
      <div>
        <div class="tb-title">RJ Global Admin</div>
        <div class="tb-sub">Lead Management Panel</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">🔔 Notifications</button>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total Leads</div></div>
    <div class="stat-card"><div class="num" id="statNew" style="color:var(--orange)">0</div><div class="lbl">New Today</div></div>
    <div class="stat-card"><div class="num" id="statUnread" style="color:var(--cyan)">0</div><div class="lbl">Unread</div></div>
    <div class="stat-card"><div class="num" id="statFollowed" style="color:var(--green)">0</div><div class="lbl">Followed Up</div></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="🔍  Search by name, email, phone..." oninput="renderLeads()"/>
    <select class="filter-select" id="filterStatus" onchange="renderLeads()">
      <option value="all">All Leads</option>
      <option value="new">New Only</option>
      <option value="read">Read</option>
    </select>
    <button class="refresh-btn" onclick="loadFromSheet()">⟳ Refresh</button>
  </div>

  <!-- LEADS -->
  <div class="leads-container">
    <div class="leads-header" id="leadsHeader">All Inquiries</div>
    <div id="leadsList"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="bnav-item active" onclick="setTab('leads',this)"><div class="bnav-icon">📋</div>Leads<span class="badge" id="navBadge">0</span></div>
    <div class="bnav-item" onclick="setTab('stats',this)"><div class="bnav-icon">📊</div>Stats</div>
    <div class="bnav-item" onclick="setTab('settings',this)"><div class="bnav-icon">⚙️</div>Settings</div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const ADMIN_PIN = '1234';           // Change this to your PIN
const SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'; // Same script URL as website
// ────────────────────────────────────────────────────────

let leads = [];
let notificationsOn = false;

// LOGIN
function doLogin(){
  const pin = document.getElementById('pinInput').value;
  if(pin === ADMIN_PIN){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('active');
    sessionStorage.setItem('rj_auth','1');
    loadFromSheet();
    startPolling();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pinInput').value = '';
  }
}

function doLogout(){
  sessionStorage.removeItem('rj_auth');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').classList.remove('active');
}

// Auto-login if session exists
if(sessionStorage.getItem('rj_auth')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').classList.add('active');
  loadFromSheet();
  startPolling();
}

// LOAD FROM GOOGLE SHEET
async function loadFromSheet(){
  try {
    const res = await fetch(SHEET_URL + '?action=getLeads');
    const data = await res.json();
    const prevCount = leads.length;
    leads = data.leads || [];
    leads.forEach(l => { if(!l.status) l.status = 'new'; });
    // Save to local
    localStorage.setItem('rj_leads', JSON.stringify(leads));
    renderLeads();
    updateStats();
    if(leads.length > prevCount && prevCount > 0){
      const diff = leads.length - prevCount;
      showToast(`📩 ${diff} new lead${diff>1?'s':''} received!`, 'info');
      if(notificationsOn) sendNotification(`New inquiry from ${leads[leads.length-1].name}`);
    }
  } catch(e){
    // Fallback to localStorage
    const saved = localStorage.getItem('rj_leads');
    if(saved){ leads = JSON.parse(saved); renderLeads(); updateStats(); }
    // Demo data if nothing
    if(leads.length === 0){
      leads = [
        {id:'1',name:'Ahmed Al Mansoori',email:'ahmed@example.com',phone:'+971 50 123 4567',service:'Microsoft 365 Setup',message:'We need to setup M365 for our team of 8 people.',timestamp:'2025-05-17T09:30:00',status:'new'},
        {id:'2',name:'Sarah Johnson',email:'sarah@tradingco.ae',phone:'+971 55 987 6543',service:'IT Support & Troubleshooting',message:'Our office network keeps dropping. Need urgent help.',timestamp:'2025-05-16T14:15:00',status:'read'},
        {id:'3',name:'Mohammed Raza',email:'m.raza@clinic.ae',phone:'+971 52 456 7890',service:'Monthly Package (Business Care)',message:'Looking for monthly IT support for our medical clinic.',timestamp:'2025-05-15T11:00:00',status:'new'},
      ];
      renderLeads();
      updateStats();
    }
  }
}

// RENDER LEADS
function renderLeads(){
  const search = document.getElementById('searchBox').value.toLowerCase();
  const filter = document.getElementById('filterStatus').value;
  let filtered = leads.filter(l => {
    const matchSearch = !search ||
      l.name.toLowerCase().includes(search) ||
      l.email.toLowerCase().includes(search) ||
      (l.phone||'').includes(search);
    const matchFilter = filter==='all' || l.status===filter;
    return matchSearch && matchFilter;
  }).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

  document.getElementById('leadsHeader').textContent =
    `${filtered.length} Inquir${filtered.length===1?'y':'ies'}`;

  const list = document.getElementById('leadsList');
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>No inquiries found</h3><p>When clients submit the contact form,<br>their details will appear here.</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(l => `
    <div class="lead-card ${l.status}" id="lead-${l.id}">
      <div class="lead-top">
        <div class="lead-avatar">${l.name.charAt(0).toUpperCase()}</div>
        <div style="flex:1">
          <div class="lead-name">${l.name}</div>
          <div class="lead-time">${formatTime(l.timestamp)}</div>
          ${l.service?`<div class="lead-service">${l.service}</div>`:''}
        </div>
      </div>
      <div class="lead-details">
        <div class="lead-detail"><span class="icon">📧</span><a href="mailto:${l.email}">${l.email}</a></div>
        <div class="lead-detail"><span class="icon">📱</span>${l.phone||'—'}</div>
      </div>
      ${l.message?`<div class="lead-message">"${l.message}"</div>`:''}
      <div class="lead-actions">
        <button class="action-btn btn-reply" onclick="replyEmail('${l.email}','${l.name}')">✉️ Reply</button>
        ${l.phone?`<button class="action-btn btn-call" onclick="callClient('${l.phone}')">📞 Call</button>`:''}
        <button class="action-btn btn-mark" onclick="markFollowedUp('${l.id}')">✅ Mark Done</button>
        <button class="action-btn btn-delete" onclick="deleteLead('${l.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function formatTime(ts){
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if(diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if(diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return d.toLocaleDateString('en-AE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function updateStats(){
  const today = new Date().toDateString();
  document.getElementById('statTotal').textContent = leads.length;
  document.getElementById('statNew').textContent = leads.filter(l=>new Date(l.timestamp).toDateString()===today).length;
  document.getElementById('statUnread').textContent = leads.filter(l=>l.status==='new').length;
  document.getElementById('statFollowed').textContent = leads.filter(l=>l.status==='done').length;
  document.getElementById('navBadge').textContent = leads.filter(l=>l.status==='new').length;
}

function replyEmail(email, name){
  const subject = encodeURIComponent(`Re: Your inquiry — RJ Global Technologies`);
  const body = encodeURIComponent(`Hi ${name},\n\nThank you for reaching out to RJ Global Technologies.\n\nWe've reviewed your inquiry and would love to help.\n\nCould we schedule a quick call to discuss your needs?\n\nBest regards,\nRJ Global Technologies Team\nDubai, UAE | redjemie.com`);
  window.open(`mailto:${email}?subject=${subject}&body=${body}`);
  markRead(leads.findIndex(l=>l.email===email));
}

function callClient(phone){
  window.open(`tel:${phone.replace(/\s/g,'')}`);
}

function markFollowedUp(id){
  const idx = leads.findIndex(l=>l.id===id);
  if(idx>=0){ leads[idx].status='done'; saveleads(); renderLeads(); updateStats(); showToast('✅ Marked as followed up','success'); }
}

function deleteLead(id){
  if(confirm('Delete this lead?')){
    leads = leads.filter(l=>l.id!==id);
    saveleads(); renderLeads(); updateStats(); showToast('🗑️ Lead deleted','info');
  }
}

function markRead(idx){
  if(idx>=0&&leads[idx].status==='new'){ leads[idx].status='read'; saveleads(); updateStats(); }
}

function saveleads(){
  localStorage.setItem('rj_leads',JSON.stringify(leads));
}

// NOTIFICATIONS
function toggleNotifications(){
  if(!('Notification' in window)){ showToast('Notifications not supported on this browser','info'); return; }
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{ if(p==='granted') enableNotifs(); });
  } else if(Notification.permission==='granted'){
    notificationsOn = !notificationsOn;
    document.getElementById('notifBtn').classList.toggle('on', notificationsOn);
    showToast(notificationsOn?'🔔 Notifications ON':'🔕 Notifications OFF', notificationsOn?'success':'info');
  } else {
    showToast('Please enable notifications in browser settings','info');
  }
}

function enableNotifs(){
  notificationsOn = true;
  document.getElementById('notifBtn').classList.add('on');
  showToast('🔔 Notifications enabled!','success');
}

function sendNotification(msg){
  if(Notification.permission==='granted' && notificationsOn){
    new Notification('RJ Global — New Lead 📩',{body:msg,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🖥️</text></svg>'});
  }
}

// POLLING — checks for new leads every 60 seconds
function startPolling(){
  setInterval(loadFromSheet, 60000);
}

function setTab(tab, el){
  document.querySelectorAll('.bnav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  if(tab==='leads') renderLeads();
}

// TOAST
function showToast(msg, type='info'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// PWA Install prompt
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  showToast('📱 Add to Home Screen for app experience!','info');
  setTimeout(()=>{ window.deferredPrompt = e; }, 3500);
});
</script>
</body>
</html>
