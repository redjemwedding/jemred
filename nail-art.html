<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon | redjemie Visions</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="img/logo.png">
<link rel="apple-touch-icon" href="img/logo.png">

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
  --bg: #050505;
  --text: #f4f4f4;
  --muted: #bdbdbd;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color: var(--text);
  min-height: 100svh;
  display: grid;
  place-items: center;
}

/* ================= CONTAINER ================= */
.wrapper {
  text-align: center;
  padding: 60px 28px;
  max-width: 520px;
}

/* LOGO */
.logo {
  margin-bottom: 40px;
}

.logo img {
  height: 46px;
  opacity: .9;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 6vw, 46px);
  margin-bottom: 18px;
}

/* SUBTEXT */
p {
  font-size: 17px;
  line-height: 1.7;
  color: var(--muted);
  margin-bottom: 40px;
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.actions a {
  padding: 14px 34px;
  border-radius: 40px;
  font-size: 14px;
  text-decoration: none;
  font-weight: 500;
  letter-spacing: .4px;
}

.primary {
  background: var(--gold);
  color: #000;
}

.secondary {
  border: 1px solid rgba(255,255,255,.25);
  color: var(--text);
}

/* FOOTER NOTE */
.note {
  margin-top: 50px;
  font-size: 13px;
  color: #777;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- LOGO -->
  <div class="logo">
    <img src="img/logo.png" alt="redjemie Visions">
  </div>

  <!-- TITLE -->
  <h1>Coming Soon</h1>

  <!-- DESCRIPTION -->
  <p>
    This business unit under <strong>redjemie Visions</strong>  
    is currently in development and will be launching soon.
  </p>

  <!-- ACTIONS -->
  <div class="actions">
    <a href="index.html" class="primary">Back to Main Site</a>
  </div>

  <!-- FOOTER -->
  <div class="note">
    © redjemie Visions. All Rights Reserved.
  </div>

</div>

</body>
</html>
