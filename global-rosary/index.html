<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rosary Room</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap" rel="stylesheet">
<style>
  body {margin:0; font-family:'Crimson Text', serif; background:#0a1f44; color:white;}
  header{padding:10px; font-size:24px; background:#000814; text-align:center; color:gold;}
  #container{display:flex; flex-direction:row; height:calc(100vh - 50px);}
  #leftPanel{width:250px; border-right:1px solid gold; padding:10px; box-sizing:border-box;}
  #rightPanel{flex:1; padding:10px; text-align:center; display:flex; flex-direction:column; align-items:center;}
  .panel{margin:10px 0; padding:10px; border:1px solid gold; border-radius:8px; width:100%;}
  #prayerText{font-size:26px; font-weight:bold; margin:15px 0;}
  #mysteryImg{max-width:90%; border-radius:10px; margin-bottom:15px;}
  #rosary{position:relative; width:350px; height:150px; margin:10px 0;}
  .bead{width:16px; height:16px; border-radius:50%; background:#666; position:absolute; transition:0.3s;}
  .bead.active{background:gold; box-shadow:0 0 10px gold;}
  #controls button{margin:5px; padding:10px 20px; border:none; border-radius:6px; font-weight:bold; cursor:pointer;}
  #endBtn{background:red; color:white;}
  #litanyPanel{height:150px; overflow-y:auto; text-align:left;}
  #participantsList div, #joinRequests div{margin:5px 0;}
</style>
</head>
<body>

<header>
  ✝️ Global Rosary Room <br>
  Room: <span id="roomCode">-</span> | Created by: <span id="roomCreator">-</span>
</header>

<div id="login" class="panel">
  <input id="nameInput" placeholder="Your Name"><br>
  <input id="roomInput" placeholder="Room Code"><br>
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="container" style="display:none;">
  <!-- Left Panel: Participants / Requests -->
  <div id="leftPanel">
    <div class="panel"><h3>Participants</h3><div id="participantsList"></div></div>
    <div class="panel"><h3>Join Requests</h3><div id="joinRequests"></div></div>
  </div>

  <!-- Right Panel: Prayer / Image / Beads / Litany -->
  <div id="rightPanel">
    <div id="prayerText"></div>
    <img id="mysteryImg" src="">
    <div id="rosary"></div>
    <div id="controls">
      <button id="prevBtn" onclick="prevStep()">Prev</button>
      <button id="nextBtn" onclick="nextStep()">Next</button>
      <button id="endBtn" onclick="endSession()" style="display:none;">End Session</button>
    </div>
    <div class="panel" id="litanyPanel"><h3>Litany</h3></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAzMIXq4bJA3LxFAet4R9mV0PRNNuoHL6w",
  authDomain: "global-rosary.firebaseapp.com",
  databaseURL: "https://global-rosary-default-rtdb.firebaseio.com",
  projectId: "global-rosary"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Persistent user */
let userId = localStorage.getItem("uid") || Date.now();
localStorage.setItem("uid", userId);
let userName = localStorage.getItem("name") || "";
let roomId = localStorage.getItem("room") || "";

/* Bead audio */
const beadAudio = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

/* Full prayers */
const prayers = {
  sign: "In the name of the Father, and of the Son, and of the Holy Spirit. Amen.",
  creed: "I believe in God, the Father almighty, Creator of heaven and earth...",
  introHail: "Hail Mary, full of grace, the Lord is with thee...",
  ourFather: "Our Father, who art in heaven, hallowed be thy name...",
  hailMary: "Hail Mary, full of grace, the Lord is with thee...",
  glory: "Glory be to the Father, and to the Son...",
  fatima: "O my Jesus, forgive us our sins, save us from the fires of hell, lead all souls to Heaven...",
  queen: "Hail, Holy Queen, Mother of mercy...",
  litany:["Lord, have mercy","Christ, have mercy","Lord, have mercy","Holy Mary, pray for us","Saint Joseph, pray for us","All saints, pray for us"]
};

/* Mystery images (Joyful example) */
const mysteryImages=["https://www.theholyrosary.org/img/joyful1.jpg",
"https://www.theholyrosary.org/img/joyful2.jpg",
"https://www.theholyrosary.org/img/joyful3.jpg",
"https://www.theholyrosary.org/img/joyful4.jpg",
"https://www.theholyrosary.org/img/joyful5.jpg"];

/* Flow build */
let flow=[];
function buildFlow(){
  flow=[{text:prayers.sign},{text:prayers.creed},{text:prayers.ourFather},{text:prayers.introHail},{text:prayers.introHail},{text:prayers.introHail},{text:prayers.glory}];
  for(let m=0;m<5;m++){
    flow.push({text:"Mystery "+(m+1), img:mysteryImages[m], reading:"Reflection "+(m+1)});
    flow.push({text:prayers.ourFather});
    for(let i=0;i<10;i++) flow.push({text:prayers.hailMary});
    flow.push({text:prayers.fatima});
    flow.push({text:prayers.glory});
  }
  flow.push({text:prayers.queen});
  flow.push({text:prayers.sign});
}
buildFlow();

/* CREATE ROOM */
window.createRoom=function(){
  userName=nameInput.value; roomId=roomInput.value;
  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);
  set(ref(db,"rooms/"+roomId),{
    host:userId,
    creator:userName,
    step:0,
    controller:userId,
    participants:{[userId]:{name:userName,status:"approved"}}
  });
  login.style.display="none";
  document.getElementById("container").style.display="flex";
  start();
};

/* JOIN ROOM */
window.joinRoom=function(){
  userName=nameInput.value; roomId=roomInput.value;
  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);
  set(ref(db,`rooms/${roomId}/participants/${userId}`),{name:userName,status:"waiting"});
  login.style.display="none";
  document.getElementById("container").style.display="flex";
  start();
};

/* AUTO REJOIN */
if(userName && roomId){login.style.display="none"; document.getElementById("container").style.display="flex"; start();}

/* APPROVE / REJECT */
window.approveUser=uid=>update(ref(db,`rooms/${roomId}/participants/${uid}`),{status:"approved"});
window.rejectUser=uid=>remove(ref(db,`rooms/${roomId}/participants/${uid}`));

/* END SESSION */
window.endSession=function(){
  if(confirm("End Rosary Session?")){
    remove(ref(db,"rooms/"+roomId));
    localStorage.clear();
    alert("Session ended");
    location.reload();
  }
};

/* NEXT / PREV Step */
window.nextStep=function(){
  get(ref(db,"rooms/"+roomId)).then(snap=>{
    const data=snap.val();
    if(!data) return;
    update(ref(db,"rooms/"+roomId),{step:data.step+1, controller:userId});
  });
};
window.prevStep=function(){
  get(ref(db,"rooms/"+roomId)).then(snap=>{
    const data=snap.val();
    if(!data) return;
    update(ref(db,"rooms/"+roomId),{step:Math.max(0,data.step-1), controller:userId});
  });
};

/* START */
function start(){
  const participantsList=document.getElementById("participantsList");
  const joinRequests=document.getElementById("joinRequests");
  const prayerText=document.getElementById("prayerText");
  const mysteryImg=document.getElementById("mysteryImg");
  const rosary=document.getElementById("rosary");
  const litanyPanel=document.getElementById("litanyPanel");
  const roomCodeEl=document.getElementById("roomCode");
  const roomCreator=document.getElementById("roomCreator");
  const endBtn=document.getElementById("endBtn");

  onValue(ref(db,"rooms/"+roomId),(snap)=>{
    const data=snap.val();
    if(!data){ alert("Session ended by host"); localStorage.clear(); location.reload(); return;}
    roomCodeEl.innerText=roomId;
    roomCreator.innerText=data.creator;

    const step=flow[data.step] || {text:"Finished"};
    prayerText.innerText=step.text;
    if(step.img) mysteryImg.src=step.img; else mysteryImg.src="";
    renderRosary(data.step);

    /* Participants */
    participantsList.innerHTML="";
    for(let uid in data.participants){
      const p=data.participants[uid];
      if(p.status==="approved"){
        const div=document.createElement("div");
        div.innerText=p.name;
        if(uid==data.controller) div.style.color="gold";
        participantsList.appendChild(div);
      }
    }

    /* Requests for host */
    joinRequests.innerHTML="";
    if(data.host==userId){
      for(let uid in data.participants){
        const p=data.participants[uid];
        if(p.status==="waiting"){
          const div=document.createElement("div");
          div.innerHTML=`${p.name} <button onclick="approveUser('${uid}')">✔</button> <button onclick="rejectUser('${uid}')">✖</button>`;
          joinRequests.appendChild(div);
        }
      }
    }

    /* Litany */
    litanyPanel.innerHTML="<h3>Litany</h3>";
    prayers.litany.forEach(l=>{
      const d=document.createElement("div");
      d.innerText=l;
      litanyPanel.appendChild(d);
    });

    /* Host controls */
    endBtn.style.display=(data.host==userId)?"inline-block":"none";
  });
}

/* Render beads */
function renderRosary(active){
  const container=document.getElementById("rosary");
  container.innerHTML="";
  const total=50; // beads
  const width=300;
  const spacing=width/total;
  for(let i=0;i<total;i++){
    const bead=document.createElement("div");
    bead.className="bead";
    bead.style.left=(i*spacing)+"px";
    if(i==active) { bead.classList.add("active"); beadAudio.play();}
    container.appendChild(bead);
  }
}
</script>

</body>
</html>
