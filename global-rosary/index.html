<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rosary</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzMIXq4bJA3LxFAet4R9mV0PRNNuoHL6w",
  authDomain: "global-rosary.firebaseapp.com",
  databaseURL: "https://global-rosary-default-rtdb.firebaseio.com",
  projectId: "global-rosary"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userId = Date.now();
let roomId = "";

/* FLOW */
const flow = [
  { type: "opening", label: "Opening Prayer" },
  { type: "mystery", index: 1 },
  { type: "mystery", index: 2 },
  { type: "mystery", index: 3 },
  { type: "mystery", index: 4 },
  { type: "mystery", index: 5 },
  { type: "closing", label: "Closing Prayer" }
];

/* CREATE ROOM */
window.createRoom = function(){
  const name = nameInput.value;
  roomId = roomInput.value;

  set(ref(db,"rooms/"+roomId),{
    host:userId,
    step:0,
    controller:userId,
    participants:{
      [userId]:{name,status:"approved"}
    },
    assignments:{}
  });

  login.style.display="none";
  start();
};

/* JOIN */
window.joinRoom = function(){
  const name = nameInput.value;
  roomId = roomInput.value;

  set(ref(db,`rooms/${roomId}/participants/${userId}`),{
    name,
    status:"waiting"
  });

  login.style.display="none";
  waiting.style.display="block";

  onValue(ref(db,`rooms/${roomId}/participants/${userId}`),(snap)=>{
    if(snap.val()?.status==="approved"){
      waiting.style.display="none";
      start();
    }
  });
};

/* APPROVE */
window.approveUser = uid => update(ref(db,`rooms/${roomId}/participants/${uid}`),{status:"approved"});
window.rejectUser = uid => remove(ref(db,`rooms/${roomId}/participants/${uid}`));

/* START */
function start(){
  main.style.display="block";

  onValue(ref(db,"rooms/"+roomId),(snap)=>{
    const data = snap.val();
    if(!data) return;

    roomCode.innerText = roomId;

    const step = flow[data.step];

    prayer.innerText =
      step.type === "mystery"
        ? "Mystery " + step.index + " (Assigned leader will pray)"
        : step.label;

    leader.innerText =
      "Leader: " + data.participants[data.controller]?.name;

    renderParticipants(data);
    renderRequests(data);
    renderAssignments(data);
  });
}

/* PARTICIPANTS */
function renderParticipants(data){
  participants.innerHTML="";

  for(let uid in data.participants){
    const p = data.participants[uid];

    if(p.status==="approved"){
      const div = document.createElement("div");
      div.innerText = p.name;
      if(uid == data.controller) div.style.color="gold";
      participants.appendChild(div);
    }
  }
}

/* HOST REQUESTS */
function renderRequests(data){
  joinRequests.innerHTML="";
  if(data.host !== userId) return;

  for(let uid in data.participants){
    const p = data.participants[uid];

    if(p.status==="waiting"){
      const div = document.createElement("div");
      div.innerHTML = `
        ${p.name}
        <button onclick="approveUser('${uid}')">✔</button>
        <button onclick="rejectUser('${uid}')">✖</button>
      `;
      joinRequests.appendChild(div);
    }
  }
}

/* ASSIGNMENT PANEL (HOST ONLY) */
function renderAssignments(data){
  if(data.host !== userId) return;

  assignmentPanel.innerHTML = "";

  const roles = ["opening","closing","m1","m2","m3","m4","m5"];

  roles.forEach(role=>{
    const select = document.createElement("select");

    for(let uid in data.participants){
      if(data.participants[uid].status==="approved"){
        const opt = document.createElement("option");
        opt.value = uid;
        opt.text = data.participants[uid].name;
        select.appendChild(opt);
      }
    }

    select.onchange = ()=>{
      let updates = {};
      updates[`assignments/${role}`] = select.value;
      update(ref(db,"rooms/"+roomId),updates);
    };

    const label = document.createElement("div");
    label.innerText = role.toUpperCase();

    assignmentPanel.appendChild(label);
    assignmentPanel.appendChild(select);
  });
}

/* NEXT STEP */
window.nextStep = function(){
  get(ref(db,"rooms/"+roomId)).then(snap=>{
    const data = snap.val();
    const step = flow[data.step];

    let allowed = false;

    if(data.host === userId) allowed = true;

    if(step.type==="opening" && data.assignments.opening==userId) allowed = true;
    if(step.type==="closing" && data.assignments.closing==userId) allowed = true;
    if(step.type==="mystery"){
      const key = "m"+step.index;
      if(data.assignments[key]==userId) allowed = true;
    }

    if(!allowed){
      alert("You are not assigned for this part");
      return;
    }

    update(ref(db,"rooms/"+roomId),{
      step:data.step+1,
      controller:userId
    });
  });
};
</script>

<style>
body{font-family:serif;background:#0a1f44;color:white;text-align:center;}
header{color:gold;font-size:28px;padding:20px;}
button{background:gold;border:none;padding:10px;margin:5px;}
.panel{margin:10px;padding:10px;border:1px solid gold;}
</style>

</head>

<body>

<header>✝️ Global Rosary Room</header>

<div id="login">
  <input id="nameInput" placeholder="Name">
  <input id="roomInput" placeholder="Room Code"><br>
  <button onclick="createRoom()">Create</button>
  <button onclick="joinRoom()">Join</button>
</div>

<div id="waiting" style="display:none;">
  Waiting for approval...
</div>

<div id="main" style="display:none;">
  <h3>Room Code: <span id="roomCode"></span></h3>

  <div class="panel">
    <h3 id="leader"></h3>
    <h2 id="prayer"></h2>
    <button onclick="nextStep()">Next</button>
  </div>

  <div class="panel">
    <h3>Participants</h3>
    <div id="participants"></div>
  </div>

  <div class="panel">
    <h3>Incoming Requests (Host Only)</h3>
    <div id="joinRequests"></div>
  </div>

  <div class="panel">
    <h3>Assignment Panel (Host Only)</h3>
    <div id="assignmentPanel"></div>
  </div>
</div>

</body>
</html>
