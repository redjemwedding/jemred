<!DOCTYPE html>
<html>
<head>
<title>Global Rosary Login</title>
<style>
body{font-family:serif;text-align:center;background:#0a1f44;color:white}
input,button{padding:12px;margin:10px;border-radius:6px}
button{background:gold;font-weight:bold}
</style>
</head>
<body>

<h1>✝️ Global Rosary</h1>

<input id="name" placeholder="Your Name"><br>
<input id="room" placeholder="Room Code"><br>

<button onclick="enter()">Enter</button>

<script>
function enter(){
  const name=document.getElementById("name").value.trim();
  const room=document.getElementById("room").value.trim();

  if(!name || !room){ alert("Fill all fields"); return; }

  localStorage.name=name;
  localStorage.room=room;

  location.href="portal.html";
}
</script>

</body>
</html>
