<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rosary</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAzMIXq4bJA3LxFAet4R9mV0PRNNuoHL6w",
  authDomain: "global-rosary.firebaseapp.com",
  databaseURL: "https://global-rosary-default-rtdb.firebaseio.com",
  projectId: "global-rosary"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* USER */
let userId = localStorage.getItem("uid") || Date.now();
localStorage.setItem("uid", userId);

let userName = localStorage.getItem("name") || "";
let roomId = localStorage.getItem("room") || "";

/* SOUND */
function playBell(){
  new Audio("https://actions.google.com/sounds/v1/alarms/bell_ring.ogg").play();
}

/* FULL PRAYERS */
const prayers = {
creed:`I believe in God, the Father Almighty, Creator of heaven and earth...`,
our:`Our Father, who art in heaven, hallowed be Thy name; Thy kingdom come; Thy will be done on earth as it is in heaven. Give us this day our daily bread...`,
hail:`Hail Mary, full of grace, the Lord is with thee...`,
glory:`Glory be to the Father, and to the Son, and to the Holy Spirit...`,
queen:`Hail Holy Queen, Mother of mercy, our life, our sweetness and our hope...`,
memorare:`Remember, O most gracious Virgin Mary, that never was it known...`,
litany:`Lord have mercy. Christ have mercy. Lord have mercy... Holy Mary, pray for us...`
};

/* IMAGES */
const images=[
"https://upload.wikimedia.org/wikipedia/commons/1/1d/Annunciation.jpg",
"https://upload.wikimedia.org/wikipedia/commons/2/2e/Visitation.jpg",
"https://upload.wikimedia.org/wikipedia/commons/3/3f/Nativity.jpg",
"https://upload.wikimedia.org/wikipedia/commons/4/4c/Presentation.jpg",
"https://upload.wikimedia.org/wikipedia/commons/5/5b/Crucifixion.jpg"
];

/* FLOW */
let flow=[];
function buildFlow(){
  flow=[
    {text:prayers.creed},
    {text:prayers.our}
  ];

  for(let m=0;m<5;m++){
    flow.push({text:"Mystery "+(m+1),img:images[m]});
    for(let i=0;i<10;i++) flow.push({text:prayers.hail});
    flow.push({text:prayers.glory});
  }

  flow.push({text:prayers.queen});
  flow.push({text:prayers.memorare});
  flow.push({text:prayers.litany});
}
buildFlow();

/* CREATE */
window.createRoom=()=>{
  userName=nameInput.value;
  roomId=roomInput.value;

  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);

  set(ref(db,"rooms/"+roomId),{
    host:userId,
    step:0,
    controller:userId,
    participants:{[userId]:{name:userName,status:"approved"}}
  });

  login.style.display="none";
  start();
};

/* JOIN */
window.joinRoom=()=>{
  userName=nameInput.value;
  roomId=roomInput.value;

  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);

  set(ref(db,`rooms/${roomId}/participants/${userId}`),{
    name:userName,
    status:"waiting"
  });

  login.style.display="none";
  waiting.style.display="block";

  onValue(ref(db,`rooms/${roomId}/participants/${userId}`),(snap)=>{
    if(snap.val()?.status==="approved"){
      waiting.style.display="none";
      start();
    }
  });
};

if(userName && roomId) start();

/* START */
function start(){
  main.style.display="block";

  onValue(ref(db,"rooms/"+roomId),(snap)=>{
    const data=snap.val();
    if(!data){location.reload();return;}

    const step=flow[data.step]||{text:"Finished"};

    prayer.innerText=step.text;

    if(step.img){
      img.src=step.img;
      img.style.display="block";
    } else {
      img.style.display="none";
    }

    renderRosary(data.step);
    playBell();
  });
}

/* ROSARY ANIMATION */
function renderRosary(active){
  rosary.innerHTML="";
  const total=60;
  const radius=100;

  for(let i=0;i<total;i++){
    const angle=(i/total)*2*Math.PI;
    const x=120+radius*Math.cos(angle);
    const y=120+radius*Math.sin(angle);

    const bead=document.createElement("div");
    bead.className="bead";
    bead.style.left=x+"px";
    bead.style.top=y+"px";

    if(i===active) bead.classList.add("active");

    rosary.appendChild(bead);
  }
}

/* NEXT */
window.nextStep=()=>{
  get(ref(db,"rooms/"+roomId)).then(snap=>{
    const data=snap.val();
    update(ref(db,"rooms/"+roomId),{
      step:data.step+1,
      controller:userId
    });
  });
};
</script>

<style>
body{
  margin:0;
  font-family:serif;
  background:#0a1f44;
  color:white;
  text-align:center;
}
header{color:gold;padding:15px;}
#rosary{
  position:relative;
  width:240px;
  height:240px;
  margin:auto;
}
.bead{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#666;
  position:absolute;
}
.active{
  background:gold;
  box-shadow:0 0 10px gold;
}
img{
  max-width:250px;
  margin:10px auto;
  display:none;
}
button{
  padding:10px;
  margin:10px;
  background:gold;
  border:none;
}
</style>

</head>

<body>

<header>✝️ Global Rosary</header>

<div id="login">
<input id="nameInput" placeholder="Name"><br>
<input id="roomInput" placeholder="Room"><br>
<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>
</div>

<div id="waiting" style="display:none;">Waiting...</div>

<div id="main" style="display:none;">
<img id="img">
<div id="prayer"></div>
<div id="rosary"></div>
<button onclick="nextStep()">Next</button>
</div>

</body>
</html>
