<!DOCTYPE html>
<html>
<head>
<title>Global Rosary</title>
<style>
body{font-family:serif;background:#1f5d78;color:white;text-align:center}
input,button{padding:12px;margin:10px;border-radius:6px}
button{background:white;font-weight:bold}
</style>
</head>
<body>

<h1>✝️ Global Rosary</h1>

<input id="name" placeholder="Your Name"><br>
<input id="room" placeholder="Room Code"><br>

<button onclick="enter('create')">Create Room</button>
<button onclick="enter('join')">Join Room</button>

<script>
function enter(type){
  const name=document.getElementById("name").value.trim();
  const room=document.getElementById("room").value.trim();

  if(!name || !room){
    alert("Please fill all fields");
    return;
  }

  localStorage.name=name;
  localStorage.room=room;
  localStorage.type=type;

  location.href="portal.html";
}
</script>

</body>
</html>
