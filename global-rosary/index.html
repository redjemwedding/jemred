<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rosary</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAzMIXq4bJA3LxFAet4R9mV0PRNNuoHL6w",
  authDomain: "global-rosary.firebaseapp.com",
  databaseURL: "https://global-rosary-default-rtdb.firebaseio.com",
  projectId: "global-rosary"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* PERSISTENT USER */
let userId = localStorage.getItem("uid") || Date.now();
localStorage.setItem("uid", userId);

let userName = localStorage.getItem("name") || "";
let roomId = localStorage.getItem("room") || "";

/* FULL PRAYERS */
const prayers = {
  sign: "In the name of the Father, and of the Son, and of the Holy Spirit. Amen.",
  creed: "I believe in God, the Father almighty, Creator of heaven and earth...",
  ourFather: "Our Father, who art in heaven, hallowed be thy name...",
  hailMary: "Hail Mary, full of grace, the Lord is with thee...",
  glory: "Glory be to the Father, and to the Son...",
  queen: "Hail, Holy Queen, Mother of mercy..."
};

/* BUILD FLOW */
let flow=[];
function buildFlow(){
  flow=[
    {text:prayers.sign},
    {text:prayers.creed},
    {text:prayers.ourFather},
    {text:prayers.hailMary},
    {text:prayers.hailMary},
    {text:prayers.hailMary},
    {text:prayers.glory}
  ];

  for(let m=1;m<=5;m++){
    flow.push({text:"Mystery "+m});
    flow.push({text:prayers.ourFather});
    for(let i=0;i<10;i++){
      flow.push({text:prayers.hailMary});
    }
    flow.push({text:prayers.glory});
  }

  flow.push({text:prayers.queen});
}
buildFlow();

/* CREATE */
window.createRoom=function(){
  userName=nameInput.value;
  roomId=roomInput.value;

  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);

  set(ref(db,"rooms/"+roomId),{
    host:userId,
    step:0,
    controller:userId,
    participants:{
      [userId]:{name:userName,status:"approved"}
    }
  });

  login.style.display="none";
  start();
};

/* JOIN */
window.joinRoom=function(){
  userName=nameInput.value;
  roomId=roomInput.value;

  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);

  set(ref(db,`rooms/${roomId}/participants/${userId}`),{
    name:userName,
    status:"waiting"
  });

  login.style.display="none";
  waiting.style.display="block";

  onValue(ref(db,`rooms/${roomId}/participants/${userId}`),(snap)=>{
    if(snap.val()?.status==="approved"){
      waiting.style.display="none";
      start();
    }
  });
};

/* AUTO REJOIN */
if(userName && roomId){
  start();
}

/* APPROVE */
window.approveUser=uid=>update(ref(db,`rooms/${roomId}/participants/${uid}`),{status:"approved"});
window.rejectUser=uid=>remove(ref(db,`rooms/${roomId}/participants/${uid}`));

/* END SESSION */
window.endSession=function(){
  if(confirm("End Rosary Session?")){
    remove(ref(db,"rooms/"+roomId));
    alert("Session ended");
    location.reload();
  }
};

/* START */
function start(){
  main.style.display="block";

  onValue(ref(db,"rooms/"+roomId),(snap)=>{
    const data=snap.val();

    if(!data){
      alert("Session ended by host");
      localStorage.clear();
      location.reload();
      return;
    }

    const step=flow[data.step]||{text:"Finished"};

    roomCode.innerText=roomId;
    leader.innerText="Leader: "+data.participants[data.controller]?.name;

    prayer.innerText=step.text;

    if(data.controller==userId){
      prayer.style.color="gold";
      prayer.style.fontSize="28px";
    }else{
      prayer.style.color="white";
      prayer.style.fontSize="20px";
    }

    renderParticipants(data);
    renderRequests(data);

    if(data.host==userId){
      endBtn.style.display="inline-block";
    }
  });
}

/* PARTICIPANTS */
function renderParticipants(data){
  participants.innerHTML="";
  for(let uid in data.participants){
    const p=data.participants[uid];
    if(p.status==="approved"){
      const div=document.createElement("div");
      div.innerText=p.name;
      if(uid==data.controller) div.style.color="gold";
      participants.appendChild(div);
    }
  }
}

/* REQUESTS */
function renderRequests(data){
  joinRequests.innerHTML="";
  if(data.host!==userId) return;

  for(let uid in data.participants){
    const p=data.participants[uid];
    if(p.status==="waiting"){
      const div=document.createElement("div");
      div.innerHTML=`${p.name}
      <button onclick="approveUser('${uid}')">✔</button>
      <button onclick="rejectUser('${uid}')">✖</button>`;
      joinRequests.appendChild(div);
    }
  }
}

/* NEXT */
window.nextStep=function(){
  get(ref(db,"rooms/"+roomId)).then(snap=>{
    const data=snap.val();
    update(ref(db,"rooms/"+roomId),{
      step:data.step+1,
      controller:userId
    });
  });
};
</script>

<style>
body{
  margin:0;
  font-family:serif;
  background:linear-gradient(#0a1f44,#000814);
  color:white;
  text-align:center;
}
header{
  color:gold;
  font-size:26px;
  padding:15px;
}
button{
  background:gold;
  border:none;
  padding:12px;
  margin:5px;
  border-radius:8px;
  width:90%;
  max-width:300px;
}
input{
  padding:12px;
  margin:5px;
  width:90%;
  max-width:300px;
}
.panel{
  margin:10px;
  padding:10px;
  border:1px solid gold;
  border-radius:10px;
}
</style>

</head>

<body>

<header>✝️ Global Rosary</header>

<div id="login">
<input id="nameInput" placeholder="Your Name"><br>
<input id="roomInput" placeholder="Room Code"><br>
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>
</div>

<div id="waiting" style="display:none;">
<h3>Waiting for approval...</h3>
</div>

<div id="main" style="display:none;">

<h3>Room: <span id="roomCode"></span></h3>
<div id="leader"></div>

<div class="panel">
<div id="prayer"></div>
<button onclick="nextStep()">Next</button>
<button id="endBtn" onclick="endSession()" style="display:none;background:red;">End Session</button>
</div>

<div class="panel">
<h3>Participants</h3>
<div id="participants"></div>
</div>

<div class="panel">
<h3>Join Requests</h3>
<div id="joinRequests"></div>
</div>

</div>

</body>
</html>
