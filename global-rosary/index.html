<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rosary</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap" rel="stylesheet">

<style>
/* ===== GLOBAL STYLE ===== */
body{
  margin:0;
  font-family:'Crimson Text', serif;
  background:#0a1f44;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:26px;
  color:gold;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* LAYOUT */
.container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* TOP INFO */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  font-size:14px;
}

/* MAIN CONTENT */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:10px;
}

/* PRAYER TEXT */
.prayer{
  font-size:24px;
  text-align:center;
  max-width:700px;
  line-height:1.6;
  margin-bottom:15px;
}

/* IMAGE */
#mysteryImg{
  width:90%;
  max-width:350px;
  border-radius:10px;
  margin-bottom:15px;
}

/* BEADS */
#rosary{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  max-width:400px;
  margin-bottom:15px;
}
.bead{
  width:12px;
  height:12px;
  margin:3px;
  border-radius:50%;
  background:#666;
}
.active{
  background:gold;
  box-shadow:0 0 10px gold;
}

/* BUTTONS */
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
}
button.danger{
  background:red;
  color:white;
}

/* SIDE PANEL */
.side{
  border-top:1px solid rgba(255,255,255,0.1);
  padding:10px;
}

.panel{
  margin-bottom:10px;
}

/* LOGIN */
#login{
  text-align:center;
  margin-top:60px;
}
input{
  padding:12px;
  margin:5px;
  border-radius:6px;
  border:none;
  width:250px;
}

/* DESKTOP */
@media(min-width:900px){
  .container{
    flex-direction:row;
  }
  .main{
    flex:3;
  }
  .side{
    flex:1;
    border-left:1px solid rgba(255,255,255,0.1);
    border-top:none;
  }
}
</style>
</head>

<body>

<header>✝️ Global Rosary</header>

<!-- LOGIN -->
<div id="login">
  <input id="nameInput" placeholder="Your Name"><br>
  <input id="roomInput" placeholder="Room Code"><br>
  <button onclick="createRoom()">Create</button>
  <button onclick="joinRoom()">Join</button>
</div>

<div id="waiting" style="display:none;text-align:center;margin-top:50px;">
  <h3>Waiting for approval...</h3>
</div>

<div id="app" class="container" style="display:none;">

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div>Room: <span id="roomCode"></span></div>
      <div>Host: <span id="hostName"></span></div>
    </div>

    <div id="prayer" class="prayer"></div>

    <img id="mysteryImg">

    <div id="rosary"></div>

    <div class="controls">
      <button onclick="prevStep()">Prev</button>
      <button onclick="nextStep()">Next</button>
      <button class="danger" onclick="endSession()" id="endBtn">End</button>
      <button onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- SIDE -->
  <div class="side">

    <div class="panel">
      <h3>Participants</h3>
      <div id="participants"></div>
    </div>

    <div class="panel">
      <h3>Requests</h3>
      <div id="requests"></div>
    </div>

    <div class="panel">
      <h3>Litany</h3>
      <div id="litany"></div>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"global-rosary.firebaseapp.com",
  databaseURL:"https://global-rosary-default-rtdb.firebaseio.com",
  projectId:"global-rosary"
});
const db = getDatabase(app);

/* USER */
let userId = localStorage.uid || Date.now();
localStorage.uid = userId;

let name = localStorage.name || "";
let room = localStorage.room || "";

/* PRAYERS */
const flow = [
  "In the name of the Father...",
  "I believe in God...",
  "Our Father...",
  "Hail Mary","Hail Mary","Hail Mary",
  "Glory Be"
];

/* CREATE */
window.createRoom = ()=>{
  name = nameInput.value;
  room = roomInput.value;

  localStorage.name=name;
  localStorage.room=room;

  set(ref(db,"rooms/"+room),{
    host:userId,
    step:0,
    participants:{
      [userId]:{name,status:"approved"}
    }
  });

  start();
};

/* JOIN */
window.joinRoom = ()=>{
  name = nameInput.value;
  room = roomInput.value;

  localStorage.name=name;
  localStorage.room=room;

  set(ref(db,`rooms/${room}/participants/${userId}`),{
    name,status:"waiting"
  });

  login.style.display="none";
  waiting.style.display="block";

  onValue(ref(db,`rooms/${room}/participants/${userId}`),(s)=>{
    if(s.val()?.status==="approved"){
      waiting.style.display="none";
      start();
    }
  });
};

/* START */
function start(){
  login.style.display="none";
  app.style.display="flex";

  onValue(ref(db,"rooms/"+room),(snap)=>{
    const d=snap.val();
    if(!d){ alert("Session ended"); location.reload(); return;}

    roomCode.innerText=room;
    hostName.innerText=d.participants[d.host]?.name;

    prayer.innerText=flow[d.step] || "Finished";

    renderParticipants(d);
    renderRequests(d);
    renderBeads(d.step);

    endBtn.style.display = d.host===userId ? "inline-block":"none";
  });
}

/* NEXT */
window.nextStep = ()=>{
  get(ref(db,"rooms/"+room)).then(s=>{
    const d=s.val();
    if(d.host!==userId) return;
    update(ref(db,"rooms/"+room),{step:d.step+1});
  });
};

/* PREV */
window.prevStep = ()=>{
  get(ref(db,"rooms/"+room)).then(s=>{
    const d=s.val();
    if(d.host!==userId) return;
    update(ref(db,"rooms/"+room),{step:Math.max(0,d.step-1)});
  });
};

/* END */
window.endSession = ()=>{
  remove(ref(db,"rooms/"+room));
  logout();
};

/* LOGOUT */
window.logout = ()=>{
  localStorage.clear();
  location.reload();
};

/* PARTICIPANTS */
function renderParticipants(d){
  participants.innerHTML="";
  for(let id in d.participants){
    let p=d.participants[id];
    if(p.status==="approved"){
      let div=document.createElement("div");
      div.innerText=p.name;
      participants.appendChild(div);
    }
  }
}

/* REQUESTS */
function renderRequests(d){
  requests.innerHTML="";
  if(d.host!==userId) return;

  for(let id in d.participants){
    let p=d.participants[id];
    if(p.status==="waiting"){
      let div=document.createElement("div");
      div.innerHTML=`
        ${p.name}
        <button onclick="approve('${id}')">✔</button>
        <button onclick="reject('${id}')">✖</button>
      `;
      requests.appendChild(div);
    }
  }
}

/* APPROVE */
window.approve = id=>{
  update(ref(db,`rooms/${room}/participants/${id}`),{status:"approved"});
};
window.reject = id=>{
  remove(ref(db,`rooms/${room}/participants/${id}`));
};

/* BEADS */
function renderBeads(active){
  rosary.innerHTML="";
  for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.className="bead";
    if(i===active) b.classList.add("active");
    rosary.appendChild(b);
  }
}
</script>

</body>
</html>
