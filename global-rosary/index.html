<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rosary</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAzMIXq4bJA3LxFAet4R9mV0PRNNuoHL6w",
  authDomain: "global-rosary.firebaseapp.com",
  databaseURL: "https://global-rosary-default-rtdb.firebaseio.com",
  projectId: "global-rosary"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* USER */
let userId = localStorage.getItem("uid") || Date.now();
localStorage.setItem("uid", userId);

let userName = localStorage.getItem("name") || "";
let roomId = localStorage.getItem("room") || "";

/* SOUND */
function playBell(){
  new Audio("https://actions.google.com/sounds/v1/alarms/bell_ring.ogg").play();
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light"));
}
if(localStorage.getItem("theme")==="true"){
  document.body.classList.add("light");
}

/* PRAYERS + SCRIPTURE */
const mysteries = {
  1:"The Agony in the Garden (Luke 22:39-46)",
  2:"The Scourging at the Pillar (John 19:1)",
  3:"The Crowning with Thorns (Matthew 27:29)",
  4:"The Carrying of the Cross (John 19:17)",
  5:"The Crucifixion (Luke 23:33)"
};

const prayers = {
  our:"Our Father, who art in heaven...",
  hail:"Hail Mary, full of grace...",
  glory:"Glory be to the Father...",
  sign:"In the name of the Father...",
  creed:"I believe in God...",
  queen:"Hail Holy Queen..."
};

/* FLOW */
let flow=[];
function buildFlow(){
  flow=[
    {text:prayers.sign},
    {text:prayers.creed}
  ];

  for(let m=1;m<=5;m++){
    flow.push({text:mysteries[m]});
    flow.push({text:prayers.our});
    for(let i=0;i<10;i++) flow.push({text:prayers.hail});
    flow.push({text:prayers.glory});
  }

  flow.push({text:prayers.queen});
}
buildFlow();

/* CREATE */
window.createRoom=()=>{
  userName=nameInput.value;
  roomId=roomInput.value;

  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);

  set(ref(db,"rooms/"+roomId),{
    host:userId,
    step:0,
    controller:userId,
    participants:{[userId]:{name:userName,status:"approved"}}
  });

  login.style.display="none";
  start();
};

/* JOIN */
window.joinRoom=()=>{
  userName=nameInput.value;
  roomId=roomInput.value;

  localStorage.setItem("name",userName);
  localStorage.setItem("room",roomId);

  set(ref(db,`rooms/${roomId}/participants/${userId}`),{
    name:userName,
    status:"waiting"
  });

  login.style.display="none";
  waiting.style.display="block";

  onValue(ref(db,`rooms/${roomId}/participants/${userId}`),(snap)=>{
    if(snap.val()?.status==="approved"){
      waiting.style.display="none";
      start();
    }
  });
};

if(userName && roomId) start();

/* APPROVE */
window.approveUser=uid=>update(ref(db,`rooms/${roomId}/participants/${uid}`),{status:"approved"});
window.rejectUser=uid=>remove(ref(db,`rooms/${roomId}/participants/${uid}`));

/* END */
window.endSession=()=>{
  if(confirm("End session?")){
    remove(ref(db,"rooms/"+roomId));
    localStorage.clear();
    location.reload();
  }
};

/* START */
function start(){
  main.style.display="block";

  onValue(ref(db,"rooms/"+roomId),(snap)=>{
    const data=snap.val();
    if(!data){
      alert("Session ended");
      location.reload();
      return;
    }

    const step=flow[data.step]||{text:"Finished"};

    prayer.innerText=step.text;

    if(data.controller==userId){
      prayer.className="leader";
    }else{
      prayer.className="";
    }

    renderParticipants(data);
    renderRequests(data);
    renderRosary(data.step);

    playBell();

    if(data.host==userId){
      endBtn.style.display="inline-block";
    }
  });
}

/* ROSARY */
function renderRosary(active){
  rosary.innerHTML="";
  const total=60;
  const radius=100;

  for(let i=0;i<total;i++){
    const angle=(i/total)*2*Math.PI;
    const x=120+radius*Math.cos(angle);
    const y=120+radius*Math.sin(angle);

    const bead=document.createElement("div");
    bead.className="bead";
    bead.style.left=x+"px";
    bead.style.top=y+"px";

    if(i===active) bead.classList.add("active");

    rosary.appendChild(bead);
  }
}

/* PARTICIPANTS */
function renderParticipants(data){
  participants.innerHTML="";
  for(let uid in data.participants){
    const p=data.participants[uid];
    if(p.status==="approved"){
      const div=document.createElement("div");
      div.className="participant";
      div.innerText=p.name;
      participants.appendChild(div);
    }
  }
}

/* REQUESTS */
function renderRequests(data){
  joinRequests.innerHTML="";
  if(data.host!==userId) return;

  for(let uid in data.participants){
    const p=data.participants[uid];
    if(p.status==="waiting"){
      const div=document.createElement("div");
      div.innerHTML=`${p.name}
      <button onclick="approveUser('${uid}')">✔</button>
      <button onclick="rejectUser('${uid}')">✖</button>`;
      joinRequests.appendChild(div);
    }
  }
}

/* NEXT */
window.nextStep=()=>{
  get(ref(db,"rooms/"+roomId)).then(snap=>{
    const data=snap.val();
    update(ref(db,"rooms/"+roomId),{
      step:data.step+1,
      controller:userId
    });
  });
};
</script>

<style>
body{
  margin:0;
  font-family:serif;
  background:#0a1f44;
  color:white;
  text-align:center;
}
body.light{
  background:#f5f5f5;
  color:black;
}
header{
  padding:15px;
  color:gold;
}
button{
  padding:10px;
  margin:5px;
  border-radius:6px;
}
#rosary{
  position:relative;
  width:240px;
  height:240px;
  margin:20px auto;
}
.bead{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#666;
  position:absolute;
}
.active{
  background:gold;
  box-shadow:0 0 10px gold;
}
.leader{
  font-size:26px;
  color:gold;
}
</style>

</head>

<body>

<header>
✝️ Global Rosary
<button onclick="toggleTheme()">🌙 Toggle</button>
</header>

<div id="login">
<input id="nameInput" placeholder="Name"><br>
<input id="roomInput" placeholder="Room"><br>
<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>
</div>

<div id="waiting" style="display:none;">Waiting...</div>

<div id="main" style="display:none;">

<div id="prayer"></div>

<div id="rosary"></div>

<button onclick="nextStep()">Next</button>
<button id="endBtn" onclick="endSession()" style="display:none;">End</button>

<div>
<h3>Participants</h3>
<div id="participants"></div>
</div>

<div>
<h3>Requests</h3>
<div id="joinRequests"></div>
</div>

</div>

</body>
</html>
