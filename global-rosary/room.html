<!DOCTYPE html>
<html>
<head>
<title>Portal</title>
</head>
<body>

<h2>Preparing Room...</h2>

<script type="module">
import { db } from "./firebase.js";
import { ref, set, get, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const name = localStorage.name;
const room = localStorage.room;
const type = localStorage.type;

const uid = localStorage.uid || Date.now().toString();
localStorage.uid = uid;

if(!name || !room){
  location.href="index.html";
}

/* CREATE ROOM */
async function createRoom(){
  const data = {
    host: uid,
    step: 0,
    createdAt: Date.now(),
    lastActive: Date.now(),
    participants:{
      [uid]:{
        name:name,
        status:"approved",
        role:"host"
      }
    }
  };

  await set(ref(db,"rooms/"+room), data);

  setTimeout(()=>{
    location.href="room.html";
  },300);
}

/* JOIN ROOM */
async function joinRoom(){
  const snap = await get(ref(db,"rooms/"+room));
  const data = snap.val();

  if(!data){
    alert("Room not found");
    location.href="index.html";
    return;
  }

  for(let id in data.participants){
    if(data.participants[id].name === name){
      alert("Name already taken");
      location.href="index.html";
      return;
    }
  }

  await update(ref(db,"rooms/"+room+"/participants/"+uid),{
    name:name,
    status:"waiting",
    role:"viewer"
  });

  location.href="room.html";
}

/* EXECUTE */
if(type==="create"){
  createRoom();
}else{
  joinRoom();
}
</script>

</body>
</html>
